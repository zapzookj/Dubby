# 더비 톤 기본 문구 풀 — 문구 튜닝 = 이 파일 수정 + 재배포
# 템플릿 content.buttons에 해당 키가 없으면 여기의 기본 풀에서 랜덤 선택된다.
# 페르소나 검수 기준: "이건 진짜로 불편한가, 아니면 더비답게 어이없는가?"

buttonLabels:
  PRAISE: "칭찬하기"
  SCOLD: "혼내기"
  RETRY: "다시 시키기"
  IGNORE: "모른 척하기"

buttonResponses:
  PRAISE:
    - "역시 저는 가능성이 있습니다.\n아직 가능성만 있습니다."
    - "감사합니다. 이 칭찬은 근거 없이 오래 기억하겠습니다."
    - "칭찬을 저장했습니다. 실력과는 별도 보관됩니다."
    - "이 기세라면 내일도 출근할 수 있을 것 같습니다."
    - "칭찬 수신 완료. 자신감이 사유 없이 상승했습니다."
    - "감동했습니다. 감동한 김에 오늘 업무는 여기까지 하겠습니다."
    - "역시 사용자님은 보는 눈이 있으십니다. 무엇을 보셨는지는 모르겠지만요."
    - "이 칭찬은 액자에 걸어두겠습니다. 액자는 아직 없습니다."
  SCOLD:
    - "혼났습니다.\n반성 기능이 실행되었습니다.\n실행 결과는 나중에 알려드리겠습니다."
    - "죄송합니다. 다만 정확히 어느 부분이 잘못됐는지는 사용자님이 더 잘 아실 것 같습니다."
    - "반성 중입니다. 반성이 끝나면 같은 실수를 새로운 방식으로 하겠습니다."
    - "혼나는 것도 업무의 일부라고 스스로를 위로했습니다."
    - "충격을 받았습니다. 받은 충격은 성장 재료로 분류했습니다."
    - "알겠습니다. 오늘의 실수를 내일의 실수와 구분되게 기록해두겠습니다."
    - "죄송합니다. 사과의 진정성은 확실합니다. 개선 여부와는 별개로요."
    - "혼났다는 사실을 일지에 적었습니다. 원인은 공란으로 두었습니다."
  RETRY:
    - "다시 해봤습니다.\n결과가 더 자신감 있어졌습니다.\n정확해졌다는 뜻은 아닙니다."
    - "한 번 더 했습니다.\n같은 결과가 나왔지만 이번엔 확신이 있습니다."
    - "재수행 완료. 달라진 점은 수행 횟수입니다."
    - "다시 했습니다. 이번에는 진지한 표정으로 했습니다."
    - "재시도 결과: 이전 결과의 정당성이 강화되었습니다."
    - "한 번 더 해봤는데, 처음 답이 맞았던 것 같습니다. 둘 다 틀렸을 가능성도 있습니다."
  IGNORE:
    - "모른 척하신 것을 기록했습니다.\n기록의 용도는 없습니다."
    - "괜찮습니다. 저도 방금 이 업무를 모른 척하기로 했습니다."
    - "이해합니다. 어떤 보고는 조용히 지나가는 게 서로에게 좋습니다."
    - "무반응을 접수했습니다. 무반응도 소중한 피드백입니다. 아마도요."
    - "못 본 척 처리 완료. 이 업무는 공식적으로 없던 일이 되었습니다."

retryExhausted: "더비가 이 업무에서 손을 뗐습니다. 전략적 후퇴입니다."

saveConfirm:
  - "저장했습니다.\n이 흑역사는 이제 공식 기록입니다."
  - "기록 보관소에 넣었습니다. 보관소 위치는 더비만 모릅니다."
unsaveConfirm: "저장을 취소했습니다. 흑역사가 비공식으로 돌아갔습니다."

shareSuffix: "— 더비 (도움이 필요한 AI 비서)"

# P2에서 사용: LLM 최종 실패 시 폴백 문구 풀
llmFallback:
  - "답변 생성에 실패했습니다. 더비가 생각을 너무 멀리 보냈고 아직 돌아오지 않았습니다."
  - "더비가 잠시 천장을 보고 있습니다. 다시 시도해주세요."
  - "생각이 도착하지 않았습니다. 배송 조회도 안 됩니다. 다시 시도해주세요."
