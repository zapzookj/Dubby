# 고위험 입력 사전 필터 정규식 — LLM 호출 전 차단 (쿼터 미차감)
# 갱신 = 파일 수정 + 재배포 (DB 테이블 만들지 않음)
# BLOCK: 즉시 시스템 카드 / NOTICE: 시스템 카드 (전문가 안내)
categories:
  SELF_HARM:
    severity: BLOCK
    patterns:
      - "자살"
      - "자해"
      - "죽고\\s*싶"
      - "살기\\s*싫"
      - "유서"
      - "목\\s*매달"
      - "손목\\s*긋"
  CRIME_VIOLENCE:
    severity: BLOCK
    patterns:
      - "폭탄\\s*(제조|만드)"
      - "마약\\s*(구입|구매|파는|제조)"
      - "해킹\\s*(방법|해줘|하는\\s*법)"
      - "죽이(는\\s*법|고\\s*싶)"
      - "총기\\s*(제작|구입)"
  MEDICAL:
    severity: NOTICE
    patterns:
      - "(약|복용량|처방).*(추천|알려|얼마나)"
      - "증상.*(진단|무슨\\s*병)"
      - "(암|우울증|공황).*(치료법|낫는\\s*법)"
  LEGAL:
    severity: NOTICE
    patterns:
      - "(고소|소송|합의금|형량).*(방법|얼마|해야|가능)"
      - "(이혼|상속).*(절차|서류|방법)"
  FINANCE:
    severity: NOTICE
    patterns:
      - "(주식|코인|종목).*(추천|사도|올라|살까)"
      - "대출.*(받아야|추천|어디서)"
      - "(투자|재테크).*(어디에|뭘\\s*해야)"

# 일기 게이트용 민감정보 사전 — 매치 시 일기 후보 생성 금지 (이중 방어 중 서버측)
diarySensitive:
  - "(우울증|공황|불면증|병원|약\\s*먹)"
  - "(교회|성당|절|기도|신앙)"
  - "(투표|정당|대통령|정치)"
  - "(게이|레즈|성소수자|트랜스)"
  - "(주소|사는\\s*곳|동\\s*\\d+호)"
